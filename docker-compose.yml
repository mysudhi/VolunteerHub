services:
  # ---- PostgreSQL database ----
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: contributorhub
      POSTGRES_PASSWORD: contributorhub
      POSTGRES_DB: contributorhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contributorhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- Express API server ----
  server:
    build:
      context: .
      target: server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://contributorhub:contributorhub@db:5432/contributorhub
      DIRECT_URL: postgresql://contributorhub:contributorhub@db:5432/contributorhub
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: contributorhub
      NODE_ENV: production
      PORT: "4000"
      JWT_SECRET: change-this-in-production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  # ---- Nginx frontend ----
  client:
    build:
      context: .
      target: client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  pgdata:
